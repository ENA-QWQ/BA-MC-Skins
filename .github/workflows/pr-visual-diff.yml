name: PR Visual Diff

on:
  pull_request:
    paths:
      - 'skins/**/*.png'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Generate Visual Diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: python scripts/pr-diff.py

      - name: Upload artifacts and post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          git fetch origin pr-artifacts || git branch pr-artifacts
          git checkout pr-artifacts || git checkout --orphan pr-artifacts
          git rm -rf . > /dev/null 2>&1 || true
          mkdir -p pr-$PR_NUMBER
          while IFS= read -r file; do
            cp "$file" pr-$PR_NUMBER/
          done < artifact-files.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Artifacts for PR #$PR_NUMBER" || echo "No changes to commit"
          git push -f origin pr-artifacts
          gh pr comment $PR_NUMBER --body-file pr_comment.md