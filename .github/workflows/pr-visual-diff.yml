name: PR Visual Diff

on:
  pull_request:
    paths:
      - 'skins/**/*.png'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: pip install Pillow

      - name: Generate Visual Diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: python scripts/pr-diff.py

      - name: Upload artifacts and post comment
        uses: gavv/pull-request-artifacts@v2
        with:
          commit: ${{ github.event.pull_request.head.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          artifacts-branch: pr-artifacts
          artifacts-prefix: pr-${{ github.event.number }}/
          artifacts: $(cat artifact-files.txt)
          comment-message: $(cat pr_comment.md)
          comment-style: text