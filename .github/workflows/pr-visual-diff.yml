name: PR Visual Diff

on:
  pull_request:
    paths:
      - 'skins/**/*.png'

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate Visual Diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/pr-diff.mjs

      - name: Upload Diff Artifacts
        if: hashFiles('diff-output/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: skin-diffs
          path: diff-output/
          retention-days: 5

      - name: Post Comment to PR
        if: hashFiles('pr_comment.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr_comment.md', 'utf8');
            if (body.trim() === '') return;
            
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const enhancedBody = body + `\n\n[Download all diff images](${artifactUrl})`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: enhancedBody
            });